<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - EV Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Target auto-generated Django form inputs to match the style */
        input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.2s;
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus, input[type="number"]:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12">
    
    <div class="w-full max-w-md bg-white rounded-[2rem] shadow-xl p-8 mx-4 border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-gray-900">Signup Form</h2>
        </div>
        
        <div class="flex bg-gray-50 border border-gray-200 rounded-full p-1 mb-8 shadow-inner">
            <a href="{% url 'login' %}" class="w-1/2 text-center py-2.5 rounded-full text-gray-600 hover:text-gray-900 font-medium transition-colors">
                Login
            </a>
            <div class="w-1/2 text-center py-2.5 rounded-full bg-blue-600 text-white font-medium shadow-md cursor-default">
                Signup
            </div>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1 pl-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-500 text-xs mt-1 pl-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="w-full bg-blue-600 text-white py-3.5 rounded-xl hover:bg-blue-700 transition-colors font-semibold text-lg mt-6 shadow-md">
                Signup
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-gray-600">
            Already have an account? <a href="{% url 'login' %}" class="text-blue-600 font-medium hover:underline">Login now</a>
        </p>
    </div>
</body>
</html>
