<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - EV Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
        }
        
        /* Target auto-generated Django form inputs to match the modern style */
        input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
            width: 100%;
            padding: 0.875rem 1.25rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            outline: none;
            transition: all 0.2s;
            color: #1e293b;
            font-size: 0.95rem;
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus, input[type="number"]:focus {
            background-color: #ffffff;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }
        
        /* Style for Django help texts underneath inputs */
        .helptext {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.35rem;
            padding-left: 0.25rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center py-12 relative overflow-hidden">
    
    <div class="absolute top-[-15%] left-[-10%] w-[50%] h-[50%] rounded-full bg-purple-200 blur-[100px] opacity-60"></div>
    <div class="absolute bottom-[-15%] right-[-10%] w-[50%] h-[50%] rounded-full bg-blue-100 blur-[100px] opacity-60"></div>

    <div class="w-full max-w-md glass-card rounded-[2rem] shadow-2xl shadow-purple-900/5 p-8 mx-4 border border-white/60 relative z-10">
        
        <div class="flex justify-center mb-6">
            <div class="bg-purple-50 text-[#8b5cf6] p-4 rounded-2xl shadow-sm border border-purple-100">
                <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
        </div>

        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-gray-900">Create Account</h2>
            <p class="text-sm text-gray-500 mt-1">Join the EV Platform as an Owner</p>
        </div>
        
        <div class="flex bg-gray-100/80 border border-gray-200 rounded-2xl p-1.5 mb-8">
            <a href="{% url 'login' %}" class="w-1/2 text-center py-2.5 rounded-xl text-gray-500 hover:text-gray-800 font-medium transition-all">
                Login
            </a>
            <div class="w-1/2 text-center py-2.5 rounded-xl bg-white text-[#8b5cf6] font-bold shadow-sm cursor-default transition-all">
                Signup
            </div>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5 pl-1">{{ field.label }}</label>
                    {{ field }}
                    
                    {% if field.errors %}
                        <p class="text-red-500 text-xs mt-1.5 font-medium pl-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="w-full bg-[#8b5cf6] text-white py-3.5 rounded-xl hover:bg-purple-600 transition-all font-bold text-[15px] mt-6 shadow-lg shadow-purple-200">
                Create Account
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-gray-600">
            Already have an account? <a href="{% url 'login' %}" class="text-[#8b5cf6] font-bold hover:underline transition-colors">Login now</a>
        </p>
    </div>
</body>
</html>
