<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Delivery Partner - EV Platform</title>
    <style>
        /* Exact same CSS as your admin form for consistency! */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fc; color: #333; margin: 0; padding: 40px 20px; }
        .form-container { max-width: 550px; margin: 0 auto; background-color: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
        h2 { margin-top: 0; color: #2d3748; font-size: 24px; }
        p.subtitle { color: #718096; font-size: 14px; margin-bottom: 30px; }
        .django-form p { margin-bottom: 20px; }
        .django-form label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; color: #4a5568; }
        .django-form input[type="text"], .django-form input[type="password"], .django-form input[type="email"] { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 15px; color: #2d3748; background-color: #f8fafc; transition: border-color 0.2s; }
        .django-form input:focus { outline: none; border-color: #8b5cf6; background-color: white; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1); }
        .django-form .helptext { display: block; font-size: 12px; color: #a0aec0; margin-top: 5px; }
        ul.errorlist { color: #e53e3e; background-color: #fff5f5; padding: 10px 15px; border-radius: 6px; font-size: 13px; list-style: none; border-left: 4px solid #e53e3e; }
        .btn-submit { background-color: #8b5cf6; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background-color 0.2s; }
        .btn-submit:hover { background-color: #7c3aed; }
        .back-link { display: block; text-align: center; margin-top: 25px; color: #8b5cf6; text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Register Delivery Partner</h2>
        <p class="subtitle">Create a new account for a delivery driver assigned to your Service Center.</p>

        {% if messages %}
            <div style="margin-bottom: 20px;">
                {% for message in messages %}
                    <div style="padding: 12px; border-radius: 6px; font-size: 14px; 
                        {% if message.tags == 'success' %}background-color: #f0fdf4; color: #166534; border: 1px solid #bbf7d0;
                        {% else %}background-color: #fff5f5; color: #c53030; border: 1px solid #fed7d7;{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="django-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Register Driver</button>
        </form>
        
        <a href="{% url 'dashboard_router' %}" class="back-link">&larr; Back to Dashboard</a>
    </div>

</body>
</html>
