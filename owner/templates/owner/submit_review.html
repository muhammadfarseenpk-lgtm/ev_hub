{% extends 'base.html' %}
{% block page_title %}Rate Station{% endblock %}
{% block header_title %}Review Station{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-[1.5rem] shadow-sm border border-gray-100 relative overflow-hidden">
    <div class="absolute top-0 right-0 w-32 h-32 bg-purple-50 rounded-bl-[100px] z-0 opacity-50"></div>

    <div class="relative z-10">
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Rate {{ station.name }}</h2>
        <p class="text-sm text-gray-500 mb-6">How was your charging experience?</p>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Star Rating (1-5)</label>
                <select name="rating" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#8b5cf6] focus:ring-1 focus:ring-[#8b5cf6] transition">
                    <option value="5">⭐⭐⭐⭐⭐ (5/5) - Excellent</option>
                    <option value="4">⭐⭐⭐⭐ (4/5) - Good</option>
                    <option value="3">⭐⭐⭐ (3/5) - Average</option>
                    <option value="2">⭐⭐ (2/5) - Poor</option>
                    <option value="1">⭐ (1/5) - Terrible</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Comments (Optional)</label>
                <textarea name="comment" rows="4" class="w-full p-3.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-[#8b5cf6] focus:ring-1 focus:ring-[#8b5cf6] transition" placeholder="Was the charger fast? Was the area clean?"></textarea>
            </div>

            <div class="pt-4 flex items-center space-x-4">
                <a href="{% url 'browse_stations' %}" class="flex-1 text-center px-6 py-3.5 rounded-xl text-sm font-bold text-gray-600 bg-gray-50 hover:bg-gray-100 transition">Cancel</a>
                <button type="submit" class="flex-1 bg-[#8b5cf6] text-white font-bold py-3.5 rounded-xl hover:bg-purple-600 transition shadow-sm">Submit Review</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
