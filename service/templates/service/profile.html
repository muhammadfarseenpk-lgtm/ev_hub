{% extends 'base.html' %}

{% block page_title %}Service Center Profile{% endblock %}
{% block header_title %}Service Center Profile{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-900">Manage Center Details</h2>
        <p class="text-sm text-gray-500">Update your service center's public information and contact details.</p>
    </div>

    <div class="bg-white rounded-[2rem] p-8 shadow-sm border border-gray-100">
        
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Service Center Name</label>
                    <input type="text" name="name" value="{{ center.name|default:'' }}" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-purple-400 focus:bg-white outline-none transition" placeholder="e.g. Elite EV Motors">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Contact Number</label>
                    <input type="text" name="contact_number" value="{{ center.contact_number|default:'' }}" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-purple-400 focus:bg-white outline-none transition" placeholder="+1 234 567 8900">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Operating Hours</label>
                    <input type="text" name="operating_hours" value="{{ center.operating_hours|default:'' }}" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-purple-400 focus:bg-white outline-none transition" placeholder="Mon-Sat, 9AM - 6PM">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Address</label>
                    <textarea name="address" rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 px-4 text-sm focus:ring-2 focus:ring-purple-400 focus:bg-white outline-none transition" placeholder="Full street address">{{ center.address|default:'' }}</textarea>
                </div>
            </div>

            <div class="flex items-center justify-end space-x-4 pt-6 border-t border-gray-100 mt-8">
                <a href="{% url 'service_dashboard' %}" class="px-6 py-3 rounded-xl text-gray-600 font-bold hover:bg-gray-100 transition">Cancel</a>
                <button type="submit" class="bg-purple-600 text-white font-bold py-3 px-8 rounded-xl shadow-md hover:bg-purple-700 transition">
                    Save Changes
                </button>
            </div>
        </form>

    </div>
</div>
{% endblock %}
