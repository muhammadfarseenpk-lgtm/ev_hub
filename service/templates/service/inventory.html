{% extends 'base.html' %}
{% block page_title %}Manage Inventory{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-900">Add / Edit Inventory Part</h2>
        <p class="text-gray-500 text-sm">Update your service center's stock levels.</p>
    </div>
    
    <form method="post" class="space-y-5">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 gap-4">
            {{ form.as_p }}
        </div>

        <div class="pt-4 flex space-x-3 border-t border-gray-100 mt-6">
            <button type="submit" class="flex-1 bg-blue-600 text-white py-2.5 rounded-lg font-bold hover:bg-blue-700 transition">
                Save Part
            </button>
            <a href="{% url 'inventory_list' %}" class="px-6 py-2.5 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
