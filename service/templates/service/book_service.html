{% extends 'base.html' %}
{% block page_title %}Book a Repair{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200">
    <div class="mb-6 border-b border-gray-200 pb-4">
        <h2 class="text-2xl font-bold text-gray-900">Schedule a Service Appointment</h2>
        <p class="text-sm text-gray-500">Provide details about your vehicle's issue and pick a time.</p>
    </div>
    
    <form method="post" class="space-y-5">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 gap-4">
            {{ form.as_p }}
        </div>

        <div class="pt-6 mt-4 border-t border-gray-100 flex space-x-3">
            <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-sm">
                Confirm Booking
            </button>
            <a href="{% url 'owner_dashboard' %}" class="px-6 py-3 bg-gray-100 text-gray-700 font-bold rounded-lg hover:bg-gray-200 transition text-center flex items-center justify-center">
                Cancel
            </a>
        </div>
    </form>
</div>

<style>
    form p { margin-bottom: 1rem; }
    form label { display: block; font-weight: 600; color: #374151; margin-bottom: 0.25rem; font-size: 0.875rem; }
    form input, form select, form textarea { 
        width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; 
    }
    form input:focus, form select:focus, form textarea:focus {
        outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6;
    }
</style>
{% endblock %}
