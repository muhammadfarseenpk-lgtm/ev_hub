{% extends 'base.html' %}
{% block page_title %}Route Guidance{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-gray-200">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h2 class="text-2xl font-bold text-gray-900">Task #{{ task.id }} Route</h2>
        <a href="{% url 'delivery_dashboard' %}" class="text-blue-600 font-medium hover:underline">&larr; Back to Dashboard</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Pickup Location</h4>
            <p class="text-gray-900 font-medium">{{ task.pickup_address }}</p>
        </div>
        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
            <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Dropoff Location</h4>
            <p class="text-gray-900 font-medium">{{ task.dropoff_address }}</p>
        </div>
    </div>

    <div class="w-full h-96 bg-gray-200 rounded-lg overflow-hidden flex items-center justify-center text-gray-500 border border-gray-300 relative">
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-50 text-xl font-bold">
            Simulated Map API Tracking
        </div>
        <svg class="h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
    </div>
</div>
{% endblock %}
