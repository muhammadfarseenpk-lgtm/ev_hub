<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | EV Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        
        @keyframes fade-up { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fade-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        
        .modern-input { width: 100%; padding: 0.875rem 1.25rem; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.75rem; outline: none; transition: all 0.2s; font-size: 0.95rem; }
        .modern-input:focus { background-color: #ffffff; border-color: #8b5cf6; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }
    </style>
</head>
<body class="bg-[#f8f9fc] text-gray-900 relative">

    <div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-purple-200 blur-[120px] opacity-50 z-0 pointer-events-none"></div>

    <nav class="fixed w-full z-50 glass-nav px-6 py-4 md:px-12 flex items-center justify-between">
        <a href="/" class="flex items-center space-x-3">
            <div class="bg-purple-100 text-[#8b5cf6] p-2.5 rounded-xl">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <span class="text-2xl font-extrabold tracking-tight text-gray-900">EV Platform</span>
        </a>
        <div class="hidden md:flex items-center space-x-8">
            <a href="{% url 'about' %}" class="text-gray-600 font-medium hover:text-[#8b5cf6] transition-colors">About</a>
            <a href="{% url 'contact' %}" class="text-[#8b5cf6] font-bold">Contact Us</a>
            <div class="w-px h-6 bg-gray-300 mx-2"></div>
            <a href="{% url 'login' %}" class="text-gray-900 font-bold hover:text-[#8b5cf6] transition-colors">Login</a>
            <a href="{% url 'register' %}" class="bg-[#8b5cf6] text-white px-6 py-2.5 rounded-xl font-bold hover:bg-purple-600 transition-all shadow-lg shadow-purple-200">Get Started</a>
        </div>
    </nav>

    <header class="relative z-10 pt-40 pb-12 px-6 text-center max-w-3xl mx-auto">
        <h1 class="animate-fade-up text-4xl md:text-5xl font-black text-gray-900 mb-4">Get in Touch</h1>
        <p class="animate-fade-up text-gray-500">Have questions about joining the network? Our team is here to help.</p>
    </header>

    <section class="relative z-10 pb-24 px-6 max-w-5xl mx-auto">
        <div class="glass-card rounded-[2rem] shadow-xl border border-white/60 p-8 md:p-12 animate-fade-up flex flex-col md:flex-row gap-12">
            
            <div class="md:w-1/3 space-y-8">
                <div>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">Email Us</h3>
                    <p class="text-lg font-bold text-[#8b5cf6]">support@evplatform.com</p>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">Call Us</h3>
                    <p class="text-lg font-bold text-gray-900">1-800-EV-POWER</p>
                    <p class="text-sm text-gray-500 mt-1">Mon-Fri, 9am - 6pm EST</p>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">Headquarters</h3>
                    <p class="text-gray-900 font-medium">100 Innovation Drive<br>Tech District, CA 94016</p>
                </div>
            </div>

            <div class="md:w-2/3">
                <form method="post" action="#" class="space-y-5">
                    {% csrf_token %}
                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5 pl-1">First Name</label>
                            <input type="text" class="modern-input" placeholder="John" required>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1.5 pl-1">Last Name</label>
                            <input type="text" class="modern-input" placeholder="Doe" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 pl-1">Email Address</label>
                        <input type="email" class="modern-input" placeholder="john@example.com" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5 pl-1">Message</label>
                        <textarea class="modern-input h-32 resize-none" placeholder="How can we help you?" required></textarea>
                    </div>
                    <button type="submit" class="w-full bg-[#8b5cf6] text-white py-3.5 rounded-xl hover:bg-purple-600 transition-all font-bold mt-2 shadow-lg shadow-purple-200">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </section>

</body>
</html>
