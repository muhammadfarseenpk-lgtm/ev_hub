<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="text-center max-w-md p-8 bg-white rounded-xl shadow-sm border border-red-100">
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
            <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">Access Restricted</h1>
        <p class="mt-2 text-gray-600">Your current role (<strong>{{ request.user.get_role_display }}</strong>) does not have permission to view this module.</p>
        <a href="{% url 'dashboard_router' %}" class="mt-6 inline-block w-full bg-gray-900 text-white px-6 py-2 rounded-md font-medium hover:bg-gray-800">
            Return to Safety
        </a>
    </div>
</body>
</html>
